<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Bank - Add Food</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header"><h1 class="sidebar-title">Food Bank</h1></div>
            <nav class="sidebar-nav">
                <ul class="nav-list"></ul>
            </nav>
        </aside>
        <main class="main-content">
            <div class="page-container">
                <div class="page-header">
                    <h1 class="page-title">Add New Food</h1>
                    <p class="page-subtitle">Add a new food item so volunteers can manage it in inventory.</p>
                </div>
                <section class="card">
                    <form id="addFoodForm" class="form-grid">
                        <div class="form-group">
                            <label for="foodName" class="form-label">Food Name</label>
                            <input id="foodName" name="foodName" type="text" class="form-input" placeholder="e.g. Canned Beans" required>
                        </div>
                        <div class="form-group">
                            <label for="quantity" class="form-label">Quantity</label>
                            <input id="quantity" name="quantity" type="number" class="form-input" min="1" placeholder="10" required>
                        </div>
                        <div class="form-group">
                            <label for="expiryDate" class="form-label">Expiration Date</label>
                            <input id="expiryDate" name="expiryDate" type="date" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label for="category" class="form-label">Category</label>
                            <select id="category" name="category" class="form-input" required>
                                <option value="">Select category</option>
                                <option value="Vegetables">Vegetables</option>
                                <option value="Fruits">Fruits</option>
                                <option value="Dairy">Dairy</option>
                                <option value="Bakery">Bakery</option>
                                <option value="Packaged">Packaged</option>
                                <option value="General">General</option>
                            </select>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Add Food</button>
                        </div>
                    </form>
                </section>
            </div>
        </main>
    </div>
    <script src="logout.js"></script>
    <script src="add-food.js"></script>
</body>
</html>
