<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Bank - Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header"><h1 class="sidebar-title">Food Bank</h1></div>
            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="dashboard.html" class="nav-link"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2-2z"/></svg><span>Dashboard</span></a></li>
                    <li class="nav-item"><a href="add-food.html" class="nav-link"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg><span>Add Food</span></a></li>
                    <li class="nav-item"><a href="inventory.html" class="nav-link active"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg><span>Inventory</span></a></li>
                    <li class="nav-item"><a href="volunteers.html" class="nav-link"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/></svg><span>Volunteers</span></a></li>
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <div class="page-container">
                <div class="page-header">
                    <h1 class="page-title">Inventory</h1>
                    <p class="page-subtitle">Manage stock levels and review expirations.</p>
                </div>

                <section class="card">
                    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 1rem;">
                        <input id="searchInput" type="search" placeholder="Search inventory..." style="padding:8px 12px; width:280px; border-radius:6px; border:1px solid #e2e8f0;">
                        <a href="add-food.html" class="btn btn-primary">Add New Food</a>
                    </div>

                    <div style="overflow:auto;">
                        <table class="table" style="width:100%; border-collapse: collapse;">
                            <thead>
                                <tr style="text-align:left; color:var(--text-muted); font-size:0.9rem;">
                                    <th>Name</th>
                                    <th>Category</th>
                                    <th>Quantity</th>
                                    <th>Expiration</th>
                                    <th>Status</th>
                                    <th style="text-align:center;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryTableBody">
                                <!-- populated by inventory.js -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="logout.js"></script>
    <script src="inventory.js"></script>
</body>
</html>
